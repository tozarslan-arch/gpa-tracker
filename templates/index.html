<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPA Tracker</title>

    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="TYX8VaitW0Xel1eW9ulAARa3s1yswBQKnBPtMulLc2Q" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
    <header>
        <h1 id="title">GPA Tracker</h1>

        <div class="language-selector">
            <label for="languageSelect" id="languageLabel">Language:</label>
            <select id="languageSelect">
                <option value="en">English</option>
                <option value="tr">Türkçe</option>
                <option value="es">Español</option>
            </select>
        </div>
    </header>

    <main>
        <section id="gpaSummary">
            <h2 id="currentGpaLabel">Current GPA:</h2>
            <div id="currentGpaValue">0.00</div>
        </section>

        <section id="chartSection">
            <canvas id="gpaChart"></canvas>
        </section>

        <section id="semestersSection">
            <h2 id="semestersLabel">Semesters</h2>
            <button id="addSemesterBtn" class="primary-btn">
                <i class="fa fa-plus"></i> <span id="addSemesterText">Add Semester</span>
            </button>

            <div id="semestersContainer"></div>
        </section>
    </main>

    <footer>
        <p>GPA Tracker © 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
