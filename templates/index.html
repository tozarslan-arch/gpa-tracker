<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPA Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body class="bg-gray-100 text-gray-900">

    <header class="hidden md:flex justify-between items-center p-4 bg-white shadow">
        <h1 id="titleText" class="text-2xl font-bold">GPA Tracker</h1>

        <div class="flex items-center gap-3">
            <select id="languageSelect" onchange="setLanguage(this.value)" class="border rounded px-2 py-1">
                <option value="en">🇺🇸 English</option>
                <option value="tr">🇹🇷 Türkçe</option>
                <option value="es">🇪🇸 Español</option>
            </select>

            <button id="btnAddSemester" onclick="addSemester()" class="px-3 py-2 bg-blue-500 text-white rounded">
                Add Semester
            </button>

            <button id="btnReset" onclick="resetAllData()" class="px-3 py-2 bg-red-500 text-white rounded">
                Reset All Data
            </button>
        </div>
    </header>

    <header class="md:hidden p-4 bg-white shadow flex justify-between items-center">
        <h1 id="mobileTitle" class="text-xl font-bold">GPA Tracker</h1>
        <button onclick="toggleMobileMenu()" class="text-2xl">
            <i class="fa fa-bars"></i>
        </button>
    </header>

    <div id="mobileMenu" class="md:hidden hidden bg-white shadow p-4 space-y-3">
        <select id="mLanguageSelect" onchange="setLanguage(this.value)" class="border rounded px-2 py-1 w-full">
            <option value="en">🇺🇸 English</option>
            <option value="tr">🇹🇷 Türkçe</option>
            <option value="es">🇪🇸 Español</option>
        </select>

        <button id="mBtnAddSemester" onclick="addSemester()" class="w-full px-3 py-2 bg-blue-500 text-white rounded">
            Add Semester
        </button>

        <button id="mBtnReset" onclick="resetAllData()" class="w-full px-3 py-2 bg-red-500 text-white rounded">
            Reset All Data
        </button>

        <p id="mLocalNote" class="text-sm text-gray-600"></p>
    </div>

    <main class="max-w-4xl mx-auto p-4 space-y-6">

        <p id="localNote" class="text-sm text-gray-600">
            Your data is stored locally in your browser.
        </p>

        <h2 id="semestersHeader" class="text-xl font-bold">Your Semesters</h2>

        <div id="semesterList" class="space-y-4"></div>

        <h2 id="chartHeader" class="text-xl font-bold mt-6">GPA Chart</h2>

        <div class="bg-white p-4 rounded shadow h-64">
            <canvas id="gpaChart"></canvas>
        </div>

 <div class="flex gap-2 mt-4">
    <button onclick="downloadTranscriptTXT()" 
            class="px-3 py-2 bg-gray-700 text-white rounded">
        Download TXT
    </button>

    <button onclick="downloadTranscriptPDF()" 
            class="px-3 py-2 bg-blue-600 text-white rounded">
        Download PDF
    </button>
</div>


    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/app2.js?v=1"></script>

</body>
</html>
