<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPA Tracker</title>

    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="TYX8VaitW0Xel1eW9ulAARa3s1yswBQKnBPtMulLc2Q" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/static/styles.css" />
</head>

<body class="bg-gray-100">

    <div class="min-h-screen flex flex-col md:flex-row">

        <!-- Desktop sidebar -->
        <aside class="hidden md:block w-64 bg-white shadow p-4">
            <h2 id="titleText" class="text-xl font-bold mb-4">GPA Tracker</h2>

            <button id="btnAddSemester" onclick="addSemester()" class="w-full bg-blue-500 text-white py-2 rounded mb-2"></button>
            <button id="btnReset" onclick="resetAllData()" class="w-full bg-red-500 text-white py-2 rounded mb-2"></button>

            <div class="flex space-x-3 text-2xl mt-4">
                <span class="cursor-pointer" onclick="setLanguage('en')">🇺🇸</span>
                <span class="cursor-pointer" onclick="setLanguage('tr')">🇹🇷</span>
                <span class="cursor-pointer" onclick="setLanguage('es')">🇪🇸</span>
            </div>

            <p id="localNote" class="text-sm text-gray-500 mt-4"></p>
        </aside>

        <!-- Mobile top bar -->
        <header class="md:hidden bg-white shadow px-4 py-3 flex items-center justify-between">
            <span id="mobileTitle" class="font-bold text-lg">GPA Tracker</span>
            <button onclick="toggleMobileMenu()" class="px-3 py-1 border rounded">☰</button>
        </header>

        <!-- Mobile menu -->
        <div id="mobileMenu" class="md:hidden bg-white shadow px-4 py-3 space-y-2 hidden">
            <button id="mBtnAddSemester" onclick="addSemester()" class="w-full bg-blue-500 text-white py-2 rounded"></button>
            <button id="mBtnReset" onclick="resetAllData()" class="w-full bg-red-500 text-white py-2 rounded"></button>

            <div class="flex space-x-3 text-2xl">
                <span class="cursor-pointer" onclick="setLanguage('en')">🇺🇸</span>
                <span class="cursor-pointer" onclick="setLanguage('tr')">🇹🇷</span>
                <span class="cursor-pointer" onclick="setLanguage('es')">🇪🇸</span>
            </div>

            <p id="mLocalNote" class="text-sm text-gray-500"></p>
        </div>

        <!-- Main content -->
        <main class="flex-1 p-4 md:p-6">
            <h1 id="semestersHeader" class="text-3xl font-bold mb-4"></h1>

            <div id="semesterList" class="space-y-4"></div>

            <h2 id="chartHeader" class="text-2xl font-bold mt-8 mb-2"></h2>
            <div class="bg-white rounded shadow p-4 max-w-3xl">
                <div class="relative" style="height: 220px;">
                    <canvas id="gpaChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
