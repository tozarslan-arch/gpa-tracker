<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100">

    <div class="flex">
        <!-- Sidebar -->
        <div class="w-64 bg-white shadow h-screen p-4">
            <h2 class="text-xl font-bold mb-4">GPA Tracker</h2>

            <button onclick="addSemester()" class="w-full bg-blue-500 text-white py-2 rounded mb-2">Add Semester</button>
            <button onclick="resetAllData()" class="w-full bg-red-500 text-white py-2 rounded mb-2">Reset All Data</button>

            <p class="text-sm text-gray-500 mt-4">Your data is stored locally in your browser.</p>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-6">
            <h1 class="text-3xl font-bold mb-4">Your Semesters</h1>

            <div id="semesterList"></div>

            <h2 class="text-2xl font-bold mt-8 mb-2">GPA Chart</h2>
            <canvas id="gpaChart" height="80"></canvas>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
