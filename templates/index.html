<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100">

    <div class="min-h-screen flex flex-col md:flex-row">

        <!-- Desktop sidebar -->
        <aside class="hidden md:block w-64 bg-white shadow p-4">
            <h2 class="text-xl font-bold mb-4">GPA Tracker</h2>

            <button onclick="addSemester()" class="w-full bg-blue-500 text-white py-2 rounded mb-2">
                Add Semester
            </button>
            <button onclick="resetAllData()" class="w-full bg-red-500 text-white py-2 rounded mb-2">
                Reset All Data
            </button>

            <p class="text-sm text-gray-500 mt-4">
                Your data is stored locally in your browser.
            </p>
        </aside>

        <!-- Mobile top bar -->
        <header class="md:hidden bg-white shadow px-4 py-3 flex items-center justify-between">
            <span class="font-bold text-lg">GPA Tracker</span>
            <button onclick="toggleMobileMenu()" class="px-3 py-1 border rounded">
                ☰
            </button>
        </header>

        <!-- Mobile menu -->
        <div id="mobileMenu" class="md:hidden bg-white shadow px-4 py-3 space-y-2 hidden">
            <button onclick="addSemester()" class="w-full bg-blue-500 text-white py-2 rounded">
                Add Semester
            </button>
            <button onclick="resetAllData()" class="w-full bg-red-500 text-white py-2 rounded">
                Reset All Data
            </button>
            <p class="text-sm text-gray-500">
                Your data is stored locally in your browser.
            </p>
        </div>

        <!-- Main content -->
        <main class="flex-1 p-4 md:p-6">
            <h1 class="text-3xl font-bold mb-4">Your Semesters</h1>

            <div id="semesterList" class="space-y-4"></div>

            <h2 class="text-2xl font-bold mt-8 mb-2">GPA Chart</h2>
            <div class="bg-white rounded shadow p-4 max-w-3xl">
                <div class="relative" style="height: 220px;">
                    <canvas id="gpaChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
